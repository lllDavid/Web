<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 onmouseover="myfunction()">Überschrift</h1>
    
    <button onclick="myfunction()"></button>
        <ul id="ul">
         
          </ul>
        <script>

            const tiere = ["Luchs", "Hirsch", "Uhu", "Wildsau", "Feldhase", "Fuchs"];

            

            function myfunction() {

                let text = "";
                for (let liste = 0; liste < tiere.length; liste++) {
                    text += "<li>"+tiere[liste] +"</li>";
                }

                document.getElementById("ul").innerHTML = text;
            }
        </script>
</body>

</html>
