<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 onmouseover="myfunction()">Überschrift</h1>
    <p id="p">Ausgabe</p>
    <button onclick="myfunction()">
        <script>

            const tiere = ["Luchs", "Hirsch", "Uhu", "Wildsau", "Feldhase", "Fuchs"];

            text += tiere[0] + "<br>";
            text += tiere[1] + "<br>";
            text += tiere[2] + "<br>";
            text += tiere[3] + "<br>";
            text += tiere[4] + "<br>";
            text += tiere[5] + "<br>";

            function myfunction() {

                let text = "";
                for (let liste = 0; liste < tiere.length; liste++) {
                    text += tiere[liste] + "<br>";
                }

                document.getElementById("p").innerHTML = text;
            }
        </script>
</body>

</html>
